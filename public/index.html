<!DOCTYPE html>
<html lang="fr-CH">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Patrimoine — Auboranges (FR)</title>

<!-- ============ LIBRAIRIES (self-hosted — CSP stricte) ============ -->
<script src="vendor/chart.umd.js"></script>
<script src="vendor/xlsx.full.min.js"></script>

<style>
/* ============================================================
   POLICES (Switzer + Satoshi — auto-hébergées)
   ============================================================ */
@font-face{font-family:'Switzer';src:url('fonts/Switzer-Regular.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'Switzer';src:url('fonts/Switzer-Medium.otf') format('opentype');font-weight:500;font-style:normal;font-display:swap;}
@font-face{font-family:'Switzer';src:url('fonts/Switzer-Semibold.otf') format('opentype');font-weight:600;font-style:normal;font-display:swap;}
@font-face{font-family:'Switzer';src:url('fonts/Switzer-Bold.otf') format('opentype');font-weight:700;font-style:normal;font-display:swap;}
@font-face{font-family:'Satoshi';src:url('fonts/Satoshi-Regular.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'Satoshi';src:url('fonts/Satoshi-Medium.otf') format('opentype');font-weight:500;font-style:normal;font-display:swap;}
@font-face{font-family:'Satoshi';src:url('fonts/Satoshi-Bold.otf') format('opentype');font-weight:700;font-style:normal;font-display:swap;}

/* ============================================================
   TOKENS
   ============================================================ */
:root{
  /* Snapshot Media — palette de marque (corail unique + neutres) */
  --canvas:#ECECEC;        /* off-white creusé pour faire ressortir les cartes blanches */
  --surface:#FFFFFF;
  --surface-2:#F5F5F5;     /* sm-off-white : fills doux, hover */
  --border:#EAEAEA;        /* sm-n-10 */
  --border-strong:#CFCFCF; /* sm-n-20 */
  --ink:#0B0B0B;           /* sm-black : texte principal */
  --ink-2:#4A4D54;         /* sm-n-60 : texte secondaire */
  --ink-3:#767676;         /* sm-n-40 : labels / muted — 4.54:1 WCAG AA */
  --forest:#1D2026;        /* sm-ink : sidebar */
  --forest-2:#0B0B0B;      /* sm-black */
  --gold:#ED5847;          /* sm-coral (accent unique) */
  --gold-deep:#B82D1C;     /* sm-coral-40 : corail lisible sur blanc */

  /* alias structurels (neutres) + voix corail */
  --primary:#1D2026;       /* structurel sombre : hypothèque, intérêts */
  --primary-2:#4A4D54;     /* neutre moyen : LPP */
  --accent:#ED5847;        /* corail : 3a, amortissement, actions */
  --pos:#4A4D54;           /* neutre (la marque n'a pas de vert) */
  --neg:#B82D1C;           /* corail foncé pour alertes */
  --muted:#4A4D54;
  --muted-2:#767676;

  --coral:#ED5847; --coral-soft:#F6ABA2; --coral-50:#E53A26;

  --font-display:'Switzer',-apple-system,sans-serif;
  --font-body:'Satoshi',-apple-system,sans-serif;

  --r-sm:8px; --r-md:14px; --r-lg:20px; --r-xl:24px;
  --sh:0 1px 2px rgba(11,11,11,.05), 0 6px 18px rgba(11,11,11,.06);
}
*{box-sizing:border-box;}
html,body{margin:0; height:100%;}
body{
  background:var(--canvas); color:var(--ink);
  font-family:var(--font-body); font-size:14px; line-height:1.5;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
h1,h2,h3,h4{margin:0; font-family:var(--font-display); font-weight:600; letter-spacing:-.015em;}
button{font-family:inherit; cursor:pointer;}
input,select{font-family:inherit;}
.num{font-variant-numeric:tabular-nums;}
::selection{background:rgba(196,154,86,.28);}

/* ============================================================
   SHELL : sidebar + main
   ============================================================ */
.app{display:flex; min-height:100vh;}
.scrim{display:none;}

.sidebar{
  width:266px; flex:none; background:var(--forest); color:#D7DCD4;
  display:flex; flex-direction:column; padding:22px 16px 18px;
  position:sticky; top:0; height:100vh;
}
.brand{display:flex; align-items:center; gap:12px; padding:4px 8px 20px;}
.brand-mark{
  width:36px; height:36px; border-radius:10px; flex:none;
  background:linear-gradient(150deg,#2A2E36,#1D2026); border:1px solid rgba(255,255,255,.12);
  display:grid; place-items:center; color:var(--gold);
}
.brand-name{font-family:var(--font-display); font-weight:600; font-size:15.5px; color:#fff; line-height:1;}
.brand-sub{font-size:11px; color:rgba(255,255,255,.5); margin-top:4px; letter-spacing:.04em;}

.property-card{
  background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.10);
  border-radius:14px; padding:15px 15px 14px; margin-bottom:20px;
}
.prop-label{font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.42);}
.prop-name{font-size:13.5px; font-weight:600; color:#EEF0EB; margin-top:8px; line-height:1.32;}
.prop-place{font-size:12px; color:rgba(255,255,255,.52); margin-top:3px;}
.prop-value{font-family:var(--font-display); font-weight:600; font-size:19px; color:#fff; margin-top:11px; font-variant-numeric:tabular-nums; letter-spacing:-.01em;}
.prop-owners{font-size:11.5px; color:rgba(255,255,255,.48); margin-top:9px; padding-top:9px; border-top:1px solid rgba(255,255,255,.09);}

.nav{display:flex; flex-direction:column; gap:2px;}
.nav-item{
  display:flex; align-items:center; gap:12px; width:100%; text-align:left;
  padding:10px 12px; border:none; background:none; border-radius:10px;
  color:rgba(255,255,255,.64); font-size:13.5px; font-weight:600; letter-spacing:.005em;
  transition:background .16s ease, color .16s ease;
}
.nav-item:hover{background:rgba(255,255,255,.06); color:#fff;}
.nav-item.active{background:rgba(255,255,255,.10); color:#fff;}
.nav-item .ic-svg{width:18px; height:18px; opacity:.8; flex:none;}
.nav-item.active .ic-svg{color:var(--gold); opacity:1;}

.sidebar-foot{margin-top:auto; padding-top:16px; border-top:1px solid rgba(255,255,255,.09); display:flex; flex-direction:column; gap:11px;}
.sync{display:flex; align-items:center; gap:8px; font-size:12px; font-weight:600; color:rgba(255,255,255,.6);}
.logout-btn{
  display:inline-flex; align-items:center; gap:8px; align-self:flex-start;
  background:rgba(255,255,255,.06); color:rgba(255,255,255,.8); border:1px solid rgba(255,255,255,.12);
  border-radius:9px; padding:7px 11px; font-size:12px; font-weight:600;
}
.logout-btn:hover{background:rgba(255,255,255,.12); color:#fff;}

.main{flex:1; min-width:0; display:flex; flex-direction:column; height:100vh; overflow:hidden;}

.topbar{
  flex:none; display:flex; align-items:center; justify-content:space-between; gap:16px;
  padding:18px clamp(20px,3vw,42px); border-bottom:1px solid var(--border); background:var(--canvas);
}
.topbar-left{display:flex; align-items:center; gap:14px;}
.crumb{font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-3);}
.page-title{font-size:23px; color:var(--ink); margin-top:4px;}
.topbar-actions{display:flex; gap:9px;}
.nav-toggle{display:none; background:var(--surface); border:1px solid var(--border-strong); color:var(--ink); border-radius:10px; width:40px; height:40px; align-items:center; justify-content:center;}

.content{flex:1; overflow-y:auto; padding:28px clamp(20px,3vw,42px) 64px; scroll-behavior:smooth;}

/* ============================================================
   COMPOSANTS
   ============================================================ */
.grid{display:grid; gap:18px;}
.kpis{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));}
.cols-2{grid-template-columns:1fr 1fr;}
.cols-3{grid-template-columns:repeat(3,1fr);}
@media(max-width:1080px){.cols-2,.cols-3{grid-template-columns:1fr;}}

.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--r-xl); padding:22px 24px; box-shadow:var(--sh);}
.card.pad-lg{padding:26px;}
.card-head{display:flex; align-items:baseline; justify-content:space-between; gap:14px; margin-bottom:18px;}
.card-head h3{font-size:16px; color:var(--ink);}
.card-note{font-size:12px; font-weight:500; color:var(--ink-3);}

.kpi{background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:20px 20px 18px; box-shadow:var(--sh); transition:transform .16s ease, border-color .16s ease;}
.kpi:hover{transform:translateY(-2px); border-color:var(--border-strong);}
.kpi-label{font-size:11px; font-weight:600; letter-spacing:.09em; text-transform:uppercase; color:var(--ink-3);}
.kpi-value{font-family:var(--font-display); font-weight:600; font-size:29px; letter-spacing:-.022em; color:var(--ink); margin-top:13px; font-variant-numeric:tabular-nums; line-height:1;}
.kpi-sub{font-size:12.5px; font-weight:500; color:var(--ink-2); margin-top:9px; font-variant-numeric:tabular-nums;}
.kpi.ink .kpi-value{color:var(--primary);}
.kpi.accent .kpi-value{color:var(--gold-deep);}
.kpi.pos .kpi-value{color:var(--pos);}

/* tables */
table.data{width:100%; border-collapse:collapse; font-size:13.5px; font-weight:500;}
table.data th{text-align:left; font-size:10.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-3); padding:0 12px 11px; border-bottom:1px solid var(--border);}
table.data td{padding:11px 12px; border-bottom:1px solid var(--border); color:var(--ink); vertical-align:middle;}
table.data tr:last-child td{border-bottom:none;}
table.data td.r,table.data th.r{text-align:right; font-variant-numeric:tabular-nums;}
table.data tr.total td{font-weight:700; border-top:1.5px solid var(--border-strong); border-bottom:none; color:var(--ink);}
table.data tr.sub td{font-weight:600; color:var(--primary);}
table.data tbody tr:hover td{background:var(--surface-2);}
table.data tr.total:hover td,table.data tr.sub:hover td{background:transparent;}
.dot{display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:9px; vertical-align:baseline;}

/* badge "à confirmer" — point doré, pas d'emoji */
.badge-est{display:inline-flex; align-items:center; gap:5px; font-size:10px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--gold-deep); margin-left:8px; white-space:nowrap;}
.badge-est::before{content:""; width:6px; height:6px; border-radius:50%; background:var(--gold); flex:none;}

/* pills */
.pill{display:inline-block; font-size:11px; font-weight:700; letter-spacing:.02em; border-radius:7px; padding:4px 9px;}
.pill.ok{background:var(--surface-2); color:var(--ink); border:1px solid var(--border-strong);}
.pill.warn{background:#FEF1EF; color:var(--gold-deep);}

/* notes éditoriales (ex-callouts, sans emoji ni boîte à accent) */
.note{background:var(--surface-2); border:1px solid var(--border); border-radius:14px; padding:16px 18px; font-size:13px; line-height:1.62; color:var(--ink-2);}
.note .note-tag{display:block; font-size:10.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin-bottom:7px;}
.note b{color:var(--ink); font-weight:700;}
.note.warn{background:#FEF6F4; border-color:var(--coral-soft);}
.note.warn .note-tag{color:var(--gold-deep);}

/* champs */
.field{display:flex; flex-direction:column; gap:6px; margin-bottom:15px;}
.field label{font-size:11.5px; font-weight:600; color:var(--ink-2); display:flex; align-items:center;}
.field input,.field select{border:1px solid var(--border-strong); border-radius:10px; padding:9px 12px; font-size:13.5px; font-weight:500; color:var(--ink); background:var(--surface); font-variant-numeric:tabular-nums; transition:border-color .15s, box-shadow .15s;}
.field input:focus,.field select:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(237,88,71,.16);}
.field .hint{font-size:11px; color:var(--ink-3);}
.fields-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:0 20px;}
.edit-table input,.edit-table select{width:100%; border:1px solid var(--border); border-radius:8px; padding:7px 8px; font-size:13px; background:var(--surface);}
.edit-table input:focus,.edit-table select:focus{outline:none; border-color:var(--accent);}
.edit-table td{padding:6px 6px;}

/* boutons */
.btn{display:inline-flex; align-items:center; gap:7px; border:1px solid transparent; border-radius:10px; padding:9px 15px; font-size:13px; font-weight:600; letter-spacing:.005em; transition:transform .12s ease, background .15s ease, border-color .15s ease, color .15s ease;}
.btn:active{transform:scale(.975);}
.btn-primary{background:var(--accent); color:#fff;}
.btn-primary:hover{background:var(--coral-50);}
.btn-ghost{background:var(--surface); color:var(--ink); border-color:var(--border-strong);}
.btn-ghost:hover{background:var(--surface-2); border-color:var(--ink-3);}
.btn-soft{background:var(--surface-2); color:var(--ink); border-color:var(--border-strong);}
.btn-soft:hover{background:#EFEBE0;}
.btn-danger{background:transparent; color:var(--neg); border-color:var(--border);}
.btn-danger:hover{background:rgba(176,83,58,.08); border-color:rgba(176,83,58,.32);}
.btn-sm{padding:6px 10px; font-size:12px; border-radius:8px; gap:5px;}
.ic-svg{width:16px; height:16px; flex:none;}
.btn-icon{padding:6px; width:30px; height:30px; justify-content:center;}

/* slider */
.slider-row{display:flex; align-items:center; gap:18px; flex-wrap:wrap;}
.slider-row > label{font-size:12px; font-weight:600; color:var(--ink-2);}
input[type=range]{flex:1; min-width:220px; accent-color:var(--accent); height:5px;}
.slider-val{font-family:var(--font-display); font-weight:600; font-size:23px; color:var(--accent); font-variant-numeric:tabular-nums; min-width:72px;}

/* jauge de progression */
.progress{height:12px; background:var(--surface-2); border:1px solid var(--border); border-radius:7px; overflow:hidden;}
.progress > i{display:block; height:100%; background:var(--accent); border-radius:7px 0 0 7px; transition:width .4s ease;}
.progress.done > i{background:var(--pos);}
.gauge-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;}
.gauge-pct{font-family:var(--font-display); font-weight:600; font-size:21px; color:var(--accent); font-variant-numeric:tabular-nums;}

/* légende */
.legend{display:flex; gap:18px; flex-wrap:wrap; font-size:12px; font-weight:500; color:var(--ink-2); margin-top:14px;}
.legend span{display:inline-flex; align-items:center; gap:8px;}
.legend i{width:16px; height:3px; border-radius:2px; display:inline-block;}
.legend i.dash{background:repeating-linear-gradient(90deg,currentColor 0 5px,transparent 5px 9px); height:2px;}

/* divers */
.section-title{font-size:11px; font-weight:700; letter-spacing:.11em; text-transform:uppercase; color:var(--ink-3); margin:32px 0 16px; display:flex; align-items:center; gap:14px;}
.section-title::after{content:""; flex:1; height:1px; background:var(--border);}
.chart-wrap{position:relative; width:100%;}
.chart-wrap.h-sm{height:230px;} .chart-wrap.h-md{height:300px;} .chart-wrap.h-lg{height:360px;}
.empty{padding:28px; text-align:center; color:var(--ink-3); font-size:13px;}
.muted{color:var(--ink-2);} .small{font-size:12px;}
.flex{display:flex;} .between{justify-content:space-between;} .center{align-items:center;}
.gap8{gap:8px;} .gap12{gap:12px;} .wrap{flex-wrap:wrap;}
.mt8{margin-top:10px;} .mt16{margin-top:16px;} .mb12{margin-bottom:12px;}

.seclabel{display:none;}

/* tables scrollables sur mobile */
.table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch;}

/* toast avec action optionnelle (undo) */
.toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#F3F1EA; padding:12px 18px; border-radius:11px; font-size:13px; font-weight:500; box-shadow:0 12px 32px -8px rgba(28,36,32,.4); opacity:0; pointer-events:none; transition:all .3s ease; z-index:300; display:flex; align-items:center; gap:12px;}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto;}
.toast-undo{background:none; border:1px solid rgba(255,255,255,.3); color:#F3F1EA; border-radius:6px; padding:3px 9px; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap;}
.toast-undo:hover{background:rgba(255,255,255,.12);}
.toast-msg{flex:1;}

/* indicateur de sync dans la topbar (visible sur mobile) */
.topbar-sync{display:none; align-items:center; gap:6px; font-size:11.5px; font-weight:600; color:var(--ink-2);}
.topbar-sync .sync-dot{font-size:8px;}

/* panneaux */
.panel{display:none; animation:fade .34s cubic-bezier(.22,1,.36,1);}
.panel.active{display:block;}
@keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}

.print-head{display:none;}

/* ============================================================
   IMPRESSION / PDF
   ============================================================ */
@media print{
  @page{margin:13mm;}
  body{background:#fff;}
  .sidebar,.topbar-actions,.nav-toggle,.toast,.login-overlay,.scrim{display:none !important;}
  .app{display:block;}
  .main{height:auto; overflow:visible;}
  .content{height:auto; overflow:visible; padding:0;}
  .topbar{border:none; padding:0 0 10px;}
  .print-head{display:flex !important; justify-content:space-between; align-items:flex-end; border-bottom:2px solid var(--ink); padding-bottom:10px; margin-bottom:16px;}
  .seclabel{display:block !important; font-size:17px; margin:0 0 14px; color:var(--ink);}
  .panel{display:block !important; page-break-before:always; padding-top:10px;}
  .panel:first-of-type{page-break-before:avoid;}
  .card,.kpi,table,.note,.chart-wrap{break-inside:avoid; box-shadow:none;}
  .card{border:1px solid #D7D1C2;}
  *{-webkit-print-color-adjust:exact; print-color-adjust:exact;}
}

@media(max-width:820px){
  .sidebar{position:fixed; left:0; top:0; z-index:200; transform:translateX(-100%); transition:transform .26s cubic-bezier(.22,1,.36,1); box-shadow:0 0 40px rgba(0,0,0,.3);}
  .app.nav-open .sidebar{transform:none;}
  .app.nav-open .scrim{display:block; position:fixed; inset:0; background:rgba(11,11,11,.4); z-index:150;}
  .nav-toggle{display:inline-flex;}
  .kpis{grid-template-columns:1fr 1fr;}
  .topbar-sync{display:flex;}
}
@media(max-width:560px){.kpis{grid-template-columns:1fr;} .topbar-actions .btn span:not(.ic-svg){display:none;}}
</style>
</head>
<body>

<div class="app" id="app">
  <div class="scrim" onclick="document.getElementById('app').classList.remove('nav-open')"></div>

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"><span data-icon="house" data-size="19"></span></div>
      <div>
        <div class="brand-name">Patrimoine</div>
        <div class="brand-sub">Gestion privée</div>
      </div>
    </div>

    <div class="property-card">
      <div class="prop-label">Bien suivi</div>
      <div class="prop-name" id="propName">—</div>
      <div class="prop-place" id="propPlace">—</div>
      <div class="prop-value num" id="propValue">—</div>
      <div class="prop-owners" id="propOwners">—</div>
    </div>

    <nav class="nav" id="nav">
      <button class="nav-item active" data-tab="recap"><span data-icon="grid"></span>Vue d'ensemble</button>
      <button class="nav-item" data-tab="couts"><span data-icon="coins"></span>Coûts &amp; financement</button>
      <button class="nav-item" data-tab="cashflow"><span data-icon="wallet"></span>Cash-flow</button>
      <button class="nav-item" data-tab="calendrier"><span data-icon="calendar"></span>Calendrier</button>
      <button class="nav-item" data-tab="projections"><span data-icon="trending"></span>3a &amp; amortissement</button>
      <button class="nav-item" data-tab="scenarios"><span data-icon="gauge"></span>Projections &amp; risque</button>
      <button class="nav-item" data-tab="parametres"><span data-icon="sliders"></span>Paramètres</button>
    </nav>

    <div class="sidebar-foot">
      <a class="logout-btn" href="https://dashboard.snapshotmedia.ch" style="text-decoration:none"><span data-icon="grid" data-size="15"></span>Portail</a>
      <div class="sync" id="syncPill">● —</div>
      <button class="logout-btn" id="logoutBtn" style="display:none" onclick="logout()"><span data-icon="logout" data-size="15"></span>Déconnexion</button>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="nav-toggle" onclick="document.getElementById('app').classList.toggle('nav-open')"><span data-icon="menu" data-size="20"></span></button>
        <div>
          <div class="crumb">Patrimoine immobilier</div>
          <h1 class="page-title" id="pageTitle">Vue d'ensemble</h1>
        </div>
      </div>
      <div class="topbar-sync" id="topbarSync"></div>
      <div class="topbar-actions">
        <button class="btn btn-ghost" onclick="exportExcel()"><span data-icon="download"></span>Excel</button>
        <button class="btn btn-ghost" onclick="exportPDF()"><span data-icon="printer"></span>PDF</button>
      </div>
    </header>

    <main class="content">
      <div class="print-head">
        <div><div class="crumb">Patrimoine immobilier</div><div id="printTitle" style="font-family:var(--font-display);font-weight:600;font-size:19px;margin-top:4px"></div></div>
        <div id="printDate" class="small muted"></div>
      </div>

/* ====================== B. PERSISTANCE & MIGRATION ====================== */
function uid(){ return 'id'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4); }
function deepMerge(def, loaded){
  if(Array.isArray(def)) return Array.isArray(loaded) ? loaded : def;
  if(def && typeof def==='object'){
    const out={...def};
    if(loaded && typeof loaded==='object'){ for(const k in loaded){ out[k]=(k in def)?deepMerge(def[k],loaded[k]):loaded[k]; } }
    return out;
  }
  return loaded===undefined ? def : loaded;
}

let state = defaultData();

/* --- Couche de données : API du portail (/api/patrimoine), repli local pour démo/hors-ligne --- */
const API='/api';
let MODE='local', AUTH_ON=false, BOOTING=true, saveTimer=null;

async function api(path, opts={}){
  // Content-Type uniquement s'il y a un corps : sinon Fastify rejette un DELETE sans body (400)
  const headers = opts.body!=null ? {'Content-Type':'application/json'} : {};
  const res = await fetch(API+path, {credentials:'same-origin', ...opts, headers:{...headers, ...(opts.headers||{})}});
  if(res.status===401){ const e=new Error('auth'); e.auth=true; throw e; }
  if(!res.ok) throw new Error('HTTP '+res.status);
  const ct=res.headers.get('content-type')||'';
  return (res.status===204 || !ct.includes('application/json')) ? null : res.json();
}
function configPayload(){ const c={...state}; delete c.historique; delete c._auth; delete c._user; return c; }

// Migration de l'ancien modèle (fp.* / frais.*) vers apports[] / fraisItems[].
// Opère sur les données BRUTES chargées (avant deepMerge) pour préserver les montants saisis.
function migrateRaw(data){
  if(!data || typeof data!=='object') return data;
  if(!Array.isArray(data.apports) && data.fp){
    const fp=data.fp;
    const half=v=>Math.round((num(v)/2)*100)/100;
    data.apports=[
      {id:uid(), libelle:'LPP / 2e pilier — Kevin',  cat:'LPP',  kevin:num(fp.lppKevin),   aurelia:0},
      {id:uid(), libelle:'LPP / 2e pilier — Aurélia', cat:'LPP',  kevin:0,                  aurelia:num(fp.lppAurelia)},
      {id:uid(), libelle:'Cash — acompte 1',          cat:'Cash', kevin:half(fp.cashAcompte1), aurelia:num(fp.cashAcompte1)-half(fp.cashAcompte1)},
      {id:uid(), libelle:'Cash — acompte 2',          cat:'Cash', kevin:half(fp.cashAcompte2), aurelia:num(fp.cashAcompte2)-half(fp.cashAcompte2)},
      {id:uid(), libelle:'3a (fonds propres)',        cat:'3a',   kevin:half(fp.troisA),    aurelia:num(fp.troisA)-half(fp.troisA)},
    ];
  }
  if(!Array.isArray(data.fraisItems)){
    data.fraisItems=defaultFraisItems();
    // Conserver d'éventuels montants banque/courtier déjà saisis
    if(data.frais){
      const fr=data.frais, find=re=>data.fraisItems.find(f=>re.test(f.libelle));
      const b=find(/dossier banque/i); if(b && !isEmpty(fr.dossierBanque)){ b.kevin=num(fr.dossierBanque)/2; b.aurelia=num(fr.dossierBanque)/2; }
      const co=find(/courtier/i);     if(co && !isEmpty(fr.courtier)){ co.kevin=num(fr.courtier)/2; co.aurelia=num(fr.courtier)/2; }
    }
  }
  return data;
}

async function boot(){
  BOOTING=true;
  initIcons();
  let migrated=false;
  try{
    const raw=await api('/state');
    migrated=!!raw && !raw.schemaV;
    const data=migrateRaw(raw);
    if(!data || typeof data!=='object') throw new Error('payload');
    state=deepMerge(defaultData(), data);
    MODE='server'; AUTH_ON=!!data._auth; setSync('ok');
  }catch(err){
    if(err && err.auth){ showLogin(); return; }
    MODE='local';
    try{ const raw=localStorage.getItem(STORE_KEY); if(raw) state=deepMerge(defaultData(), migrateRaw(JSON.parse(raw))); }catch(e){}
    setSync('local');
  }
  renderAll();
  BOOTING=false;
  if(migrated) save(); // persiste la migration une fois le boot terminé
}

function save(){
  if(BOOTING) return;
  if(MODE==='server'){
    clearTimeout(saveTimer); setSync('saving');
    saveTimer=setTimeout(()=>saveToServer(configPayload(), 1), 600);
  }else{
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
    setSync('local');
  }
}
async function saveToServer(payload, attempt){
  try{
    await api('/config',{method:'PUT',body:JSON.stringify(payload)});
    setSync('ok');
  }catch(e){
    if(attempt < 3){ setTimeout(()=>saveToServer(payload, attempt+1), 2000*attempt); }
    else{ setSync('error'); toast('Sauvegarde échouée (3 tentatives). Pensez à exporter vos données.'); }
  }
}

function setSync(s){
  const p=document.getElementById('syncPill');
  const tb=document.getElementById('topbarSync');
  const map={ok:['rgba(245,245,245,.85)','Synchronisé','#4A4D54'], saving:['#F6ABA2','Enregistrement…','#ED5847'], error:['#ED5847','Erreur de synchro','#B82D1C'], local:['rgba(255,255,255,.5)','Mode local','#767676']};
  const [col,txt,tbCol]=map[s]||map.local;
  if(p) p.innerHTML=`<span style="color:${col};font-size:9px">●</span> ${txt}`;
  if(tb) tb.innerHTML=`<span class="sync-dot" style="color:${tbCol}">●</span>${txt}`;
  const lo=document.getElementById('logoutBtn'); if(lo) lo.style.display=(MODE==='server'&&AUTH_ON)?'':'none';
}

/* Auth gérée par le portail (magic-link). Session expirée/absente → retour au portail. */
function showLogin(){ location.href='https://dashboard.snapshotmedia.ch'; }

/* ====================== C. HELPERS DE FORMAT ====================== */

// Échappe les caractères HTML dangereux pour une insertion sûre via innerHTML
function esc(v){ return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// Debounce : retarde l'exécution de fn de ms millisecondes (évite les re-renders sur chaque frappe)
function debounce(fn,ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }

const fmtCHF0=new Intl.NumberFormat('de-CH',{style:'currency',currency:'CHF',maximumFractionDigits:0});
const fmtCHF2=new Intl.NumberFormat('de-CH',{style:'currency',currency:'CHF',minimumFractionDigits:2,maximumFractionDigits:2});
const fmtNum =new Intl.NumberFormat('de-CH',{maximumFractionDigits:0});
function chf(n,dec){ n=num(n); return dec?fmtCHF2.format(n):fmtCHF0.format(n); }
function pct(n,dec=1){ return (num(n)).toFixed(dec).replace('.',',')+' %'; }
function num(v){ if(v===null||v===undefined||v==='') return 0; const n=typeof v==='number'?v:parseFloat(String(v).replace(/[^0-9.\-]/g,'')); return isNaN(n)?0:n; }
function isEmpty(v){ return v===null||v===undefined||v===''; }
function fmtDate(iso){ if(!iso) return '—'; const [y,m,d]=String(iso).split('-'); if(!y||!m||!d) return '—'; return `${d}.${m}.${y}`; }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function yearsBetween(a,b){ return (new Date(b)-new Date(a))/(86400000*365.25); }
function addMonths(iso,m){ const d=new Date(iso); if(isNaN(d)) return todayISO(); d.setMonth(d.getMonth()+m); return d.toISOString().slice(0,10); }
function badge(){ return '<span class="badge-est">à confirmer</span>'; }
function note(tag,html,warn){ return `<div class="note${warn?' warn':''}"><span class="note-tag">${tag}</span><div>${html}</div></div>`; }
function toast(msg, undoFn=null){
  const t=document.getElementById('toast'), m=document.getElementById('toastMsg');
  m.textContent=msg;
  // Nettoyer l'ancien bouton undo s'il existe
  const old=t.querySelector('.toast-undo'); if(old) old.remove();
  if(undoFn){
    const btn=document.createElement('button'); btn.className='toast-undo'; btn.textContent='Annuler';
    btn.onclick=()=>{ undoFn(); t.classList.remove('show'); };
    t.appendChild(btn);
  }
  t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),undoFn?5000:2400);
}

/* ====================== D. CALCULS ====================== */
function calc(){
  const s=state;
  const base=num(s.prix.baseBancaire), hyp=num(s.fin.hypotheque), r2=num(s.fin.deuxiemeRang), r1=Math.max(0,hyp-r2);
  const ltv=base>0?hyp/base*100:0;
  let mt=0,wt=0; s.tranches.forEach(t=>{const m=num(t.montant); mt+=m; wt+=m*num(t.taux);});
  const tauxMoyen=mt>0?wt/mt:0;
  const interetsAnnuels=s.tranches.reduce((a,t)=>a+num(t.montant)*num(t.taux)/100,0);
  const chargesPPE=num(s.charges.chargesPPE), fondsReno=num(s.charges.fondsReno), amort=num(s.fin.amortAnnuel);
  const detentionAn=interetsAnnuels+amort+chargesPPE+fondsReno;
  const tauxTheo=num(s.charges.tauxTheorique);
  const entretienTheo=base*num(s.charges.entretienPct)/100;
  const interetTheo=hyp*tauxTheo/100;
  const chargeTheoAnnuelle=interetTheo+amort+entretienTheo;
  const revenu=num(s.charges.revenuBrut);
  const tauxEffort=revenu>0?chargeTheoAnnuelle/revenu*100:null;

  // --- Apports (fonds propres versés), ventilés Kevin / Aurélia ---
  const apports=Array.isArray(s.apports)?s.apports:[];
  const apTot=a=>num(a.kevin)+num(a.aurelia);
  const sumCat=cat=>apports.filter(a=>a.cat===cat).reduce((x,a)=>x+apTot(a),0);
  const sousLPP=sumCat('LPP'), sousCash=sumCat('Cash'), sousTroisA=sumCat('3a');
  const apportKevin=apports.reduce((x,a)=>x+num(a.kevin),0);
  const apportAurelia=apports.reduce((x,a)=>x+num(a.aurelia),0);
  const fpApports=apportKevin+apportAurelia;
  const fpTotal=fpApports;                 // fonds propres réellement versés
  const fpExige=num(s.fp&&s.fp.total);     // fonds propres exigés par la banque (référence)

  // --- Frais & taxes détaillés, ventilés Kevin / Aurélia ---
  const fraisItems=Array.isArray(s.fraisItems)?s.fraisItems:[];
  const frTot=f=>num(f.kevin)+num(f.aurelia);
  const fraisTotal=fraisItems.reduce((x,f)=>x+frTot(f),0);
  const fraisKevin=fraisItems.reduce((x,f)=>x+num(f.kevin),0);
  const fraisAurelia=fraisItems.reduce((x,f)=>x+num(f.aurelia),0);

  // --- Synthèses ---
  const coutOperation=num(s.prix.prixTotalActe)+fraisTotal;   // prix + frais (hypothèque incluse)
  const decaisseReel=fpApports+fraisTotal;                    // ce qui sort des poches (hors hypothèque)
  const decaisseKevin=apportKevin+fraisKevin;
  const decaisseAurelia=apportAurelia+fraisAurelia;

  const versement3aTotal=s.contrats.reduce((a,c)=>a+num(c.versement),0);
  return {base,hyp,r1,r2,ltv,tauxMoyen,interetsAnnuels,chargesPPE,fondsReno,amort,detentionAn,interetTheo,entretienTheo,chargeTheoAnnuelle,tauxEffort,revenu,
    sousLPP,sousCash,sousTroisA,apportKevin,apportAurelia,fpApports,fpTotal,fpExige,
    fraisTotal,fraisKevin,fraisAurelia,coutOperation,decaisseReel,decaisseKevin,decaisseAurelia,versement3aTotal};
}
function projectionSeries(c, rendement){
  const horizon=num(state.fin.dureeAmort), versement=c.versement3aTotal, cible=[], proj=[]; let v=0;
  for(let y=0;y<=horizon;y++){ cible.push(versement*y); if(y===0){proj.push(0);} else {v=v*(1+rendement/100)+versement; proj.push(v);} }
  return {cible, proj, horizon};
}
function realTotals(){
  const s=state, dates=[...new Set(s.historique.map(h=>h.date))].sort();
  return dates.map(d=>{ let total=0; s.contrats.forEach(c=>{ const past=s.historique.filter(h=>h.contratId===c.id && h.date<=d).sort((a,b)=>a.date.localeCompare(b.date)); if(past.length) total+=num(past[past.length-1].valeur); }); return {date:d, value:total}; });
}
// Réévaluations réelles du bien, triées par date
function valeursBienSorted(){ return [...(Array.isArray(state.valeursBien)?state.valeursBien:[])].sort((a,b)=>a.date.localeCompare(b.date)); }
// Dernière valeur réelle saisie, sinon prix à l'acte
function valeurReelleActuelle(){ const v=valeursBienSorted(); return v.length?num(v[v.length-1].valeur):num(state.prix.prixTotalActe); }
// Versements 3a agrégés par titulaire (pour le plafond)
function versementsParTitulaire(){
  const m=new Map();
  (state.contrats||[]).forEach(c=>{ const k=(c.titulaire||'—').trim(); m.set(k,(m.get(k)||0)+num(c.versement)); });
  return [...m.entries()].map(([titulaire,versement])=>({titulaire,versement}));
}

function compareSeries(rendement){
  const s=state, c=calc(), horizon=num(s.fin.dureeAmort), tx=c.tauxMoyen/100, amort=num(s.fin.amortAnnuel);
  const interIndirect=[], interDirect=[], capital3a=[]; let cumInd=0,cumDir=0,dette=c.hyp,cap=0; const versement=c.versement3aTotal;
  for(let y=0;y<=horizon;y++){ if(y>0){ cumInd+=c.hyp*tx; cumDir+=dette*tx; dette=Math.max(c.r1,dette-amort); cap=cap*(1+rendement/100)+versement; } interIndirect.push(cumInd); interDirect.push(cumDir); capital3a.push(cap); }
  return {horizon,interIndirect,interDirect,capital3a,detteFinaleDirect:dette,detteFinaleIndirect:c.hyp,interTotalIndirect:cumInd,interTotalDirect:cumDir,capitalFinal:cap,surcout:cumInd-cumDir};
}

/* ====================== E. RENDU ====================== */
const charts={};
function destroyChart(k){ if(charts[k]){ charts[k].destroy(); delete charts[k]; } }

function renderHeader(){
  const s=state;
  document.getElementById('propName').textContent=s.meta.bien;
  document.getElementById('propPlace').textContent=s.meta.lieu;

/* ---------- E.3 CALENDRIER ---------- */
function renderCalendrier(){
  const c=calc(), s=state, today=todayISO();
  const rows=[];
  s.tranches.forEach((t,i)=>{ rows.push({date:t.echeance, type:'Échéance tranche', label:`Tranche ${i+1} — ${chf(t.montant)} @ ${pct(t.taux,2)} (${t.type})`, jours:daysBetween(today,t.echeance), action:`<button class="btn btn-soft btn-sm" onclick="goRenegocier()">Renégocier</button>`}); });
  const nextVers=nextAnniversary(s.meta.dateAcquisition);
  rows.push({date:nextVers, type:'Versement 3a', label:`Versement annuel ${chf(c.versement3aTotal)} (amortissement indirect)`, jours:daysBetween(today,nextVers), action:'—'});
  const lastEntry=s.historique.length?[...s.historique].sort((a,b)=>b.date.localeCompare(a.date))[0].date:null;
  const nextSaisie=lastEntry?addMonths(lastEntry,6):today;
  rows.push({date:nextSaisie, type:'Saisie 3a recommandée', label:lastEntry?`6 mois après la dernière saisie (${fmtDate(lastEntry)})`:'Première saisie à effectuer', jours:daysBetween(today,nextSaisie), action:`<button class="btn btn-soft btn-sm" onclick="switchTab('projections')">Saisir</button>`});
  rows.sort((a,b)=>a.date.localeCompare(b.date));
  const joursPill=d=>d<0?`<span class="pill warn">échu · ${Math.abs(d)} j</span>`:(d<90?`<span class="pill warn">${d} j</span>`:`<span class="pill ok">${d} j</span>`);
  document.getElementById('calendrierBody').innerHTML=`
    <div class="card">
      <div class="card-head"><h3>Échéances &amp; rappels</h3><span class="card-note">triés par date</span></div>
      <table class="data">
        <thead><tr><th>Date</th><th>Type</th><th>Détail</th><th class="r">Compte à rebours</th><th>Action</th></tr></thead>
        <tbody>${rows.map(r=>`<tr><td class="num">${fmtDate(r.date)}</td><td>${r.type}</td><td>${r.label}</td><td class="r">${joursPill(r.jours)}</td><td>${r.action}</td></tr>`).join('')}</tbody>
      </table>
    </div>
    <div class="card" style="margin-top:18px">
      <div class="card-head"><h3>Temps restant avant échéance des tranches</h3></div>
      <div class="chart-wrap h-sm"><canvas id="chCalBar"></canvas></div>
    </div>`;
  buildCalBar();
}
function nextAnniversary(iso){ if(!iso) return todayISO(); const base=new Date(iso); if(isNaN(base)) return todayISO(); const now=new Date(); const d=new Date(now.getFullYear(),base.getMonth(),base.getDate()); if(d<now) d.setFullYear(now.getFullYear()+1); return d.toISOString().slice(0,10); }
function goRenegocier(){ switchTab('parametres'); setTimeout(()=>toast('Modifiez le taux de la tranche dans la table.'),200); }

/* ---------- E.4 PROJECTIONS & 3a ---------- */
function renderProjections(){
  const c=calc(), s=state, cmp=compareSeries(s.rendement), reals=realTotals();
  const valeurReelle=reals.length?reals[reals.length-1].value:0;
  const cibleSerie=projectionSeries({c, versement3aTotal:c.versement3aTotal}, s.rendement);
  const projFinale=cibleSerie.proj[cibleSerie.proj.length-1];
  // #6 — Jauge objectif 2e rang : progression du capital 3a réel vs objectif, et date estimée d'atteinte
  const progrPct=c.r2>0?Math.min(100, valeurReelle/c.r2*100):0;
  let cap=valeurReelle, yrs=0; const vers=c.versement3aTotal, rdt=num(s.rendement)/100;
  while(cap<c.r2 && yrs<60){ cap=cap*(1+rdt)+vers; yrs++; }
  const atteintAnnee = cap>=c.r2 ? new Date().getFullYear()+yrs : null;
  // #7 — Plafond 3a : versements agrégés par titulaire vs plafond déductible
  const plafond=num(s.plafond3a), parTit=versementsParTitulaire();
  const margeTotale=parTit.reduce((a,t)=>a+Math.max(0,plafond-t.versement),0);
  document.getElementById('projectionsBody').innerHTML=`
    <div class="grid kpis">
      <div class="kpi accent"><div class="kpi-label">Objectif 2e rang</div><div class="kpi-value num">${chf(c.r2)}</div><div class="kpi-sub">à constituer sur ${cmp.horizon} ans</div></div>
      <div class="kpi"><div class="kpi-label">Versements 3a / an</div><div class="kpi-value num">${chf(c.versement3aTotal)}</div><div class="kpi-sub">${s.contrats.map(x=>x.titulaire).join(' + ')}</div></div>
      <div class="kpi pos"><div class="kpi-label">Projection au terme @ ${pct(s.rendement,1)}</div><div class="kpi-value num">${chf(projFinale)}</div><div class="kpi-sub">intérêts composés annuels</div></div>
      <div class="kpi ink"><div class="kpi-label">Valeur réelle saisie</div><div class="kpi-value num">${reals.length?chf(valeurReelle):'—'}</div><div class="kpi-sub">${reals.length?fmtDate(reals[reals.length-1].date):'aucune saisie'}</div></div>
    </div>

    <div class="grid cols-2" style="margin-top:18px; align-items:start">
      <div class="card">
        <div class="card-head"><h3>Progression — objectif 2e rang</h3><span class="card-note">capital 3a réel vs ${chf(c.r2)}</span></div>
        <div class="gauge-head"><span class="gauge-pct">${pct(progrPct,0)}</span><span class="muted small">${chf(valeurReelle)} / ${chf(c.r2)}</span></div>
        <div class="progress ${progrPct>=100?'done':''}"><i style="width:${progrPct.toFixed(1)}%"></i></div>
        <table class="data" style="margin-top:14px"><tbody>
          <tr><td>Capital 3a constitué (réel)</td><td class="r num">${chf(valeurReelle)}</td></tr>
          <tr><td>Reste à constituer</td><td class="r num">${chf(Math.max(0,c.r2-valeurReelle))}</td></tr>
          <tr class="sub"><td>Atteinte estimée @ ${pct(s.rendement,1)}</td><td class="r num">${atteintAnnee?(atteintAnnee<=new Date().getFullYear()?'objectif atteint':atteintAnnee):'au-delà de l\'horizon'}</td></tr>
        </tbody></table>
        ${reals.length?'':`<div style="margin-top:12px">${note('Astuce', `Saisissez la valeur réelle de vos contrats 3a ci-dessous pour suivre la progression réelle (sinon basée sur 0).`)}</div>`}
      </div>
      <div class="card">
        <div class="card-head"><h3>Plafond 3a déductible</h3><span class="card-note">${chf(plafond)} / personne / an</span></div>
        <table class="data">
          <thead><tr><th>Titulaire</th><th class="r">Versement</th><th class="r">Plafond</th><th class="r">Marge</th></tr></thead>
          <tbody>${parTit.map(t=>{ const marge=plafond-t.versement, under=marge>0.5; return `<tr><td>${esc(t.titulaire)}</td><td class="r num">${chf(t.versement)}</td><td class="r num">${chf(plafond)}</td><td class="r">${under?`<span class="pill warn">${chf(marge)} libre</span>`:'<span class="pill ok">max</span>'}</td></tr>`; }).join('')}</tbody>
        </table>
        <div style="margin-top:12px">${margeTotale>0.5?note('Déduction non utilisée', `Il reste <b>${chf(margeTotale)}</b> de marge déductible cette année. Augmenter les versements (jusqu'au plafond) maximise l'économie d'impôt <span class="muted small">(modifiez le plafond dans Paramètres)</span>.`,true):note('Plafond atteint', `Les versements atteignent le plafond déductible — l'avantage fiscal 3a est maximisé.`)}</div>
      </div>
    </div>

    <div class="card" style="margin-top:18px">
      <div class="card-head"><h3>Suivi vivant du capital 3a — amortissement indirect</h3></div>
      <div class="slider-row mb12">
        <label>Rendement annuel supposé des fonds</label>

        <div style="margin-top:14px">${(()=>{
          // Estimation simplifiée de l'avantage fiscal (canton FR, taux marginal indicatif)
          const txMarginal=0.25; // ~25% indicatif (à vérifier avec votre conseiller fiscal)
          const econInteret=c.interetsAnnuels*txMarginal;
          const econTroisA=c.versement3aTotal*txMarginal;
          const valLocative=c.base*0.035*0.70; // valeur locative FR ≈ 3.5% VNP × 70%
          const coutValLoc=valLocative*txMarginal;
          const gainFiscalNet=econInteret+econTroisA-coutValLoc;
          return note('Estimation fiscale FR (indicative, taux marginal ~25%)',
            `Économie sur intérêts : <b>${chf(econInteret)}/an</b> · Économie 3a : <b>${chf(econTroisA)}/an</b><br>
             Surcoût valeur locative imposable (~${chf(valLocative)}) : <b>−${chf(coutValLoc)}/an</b><br>

        })()}</div>
      </div>
    </div>

    `;
  buildProjChart(); buildCompareChart();
}
function onRendement(v){ state.rendement=num(v); document.getElementById('rendVal').textContent=pct(state.rendement,1); save(); renderProjections(); }
function onTauxRenov(v){ state.tauxRenovRisk=num(v); const el=document.getElementById('renovVal'); if(el) el.textContent=pct(state.tauxRenovRisk,1); save(); renderScenarios(); }

/* ---------- E.4b PROJECTIONS & RISQUE ---------- */
function renderScenarios(){
  const c=calc(), s=state;
  const horizon=num(s.fin.dureeAmort), rb=num(s.rendementBien)/100;
  const valFin=c.base*Math.pow(1+rb, horizon);
  const detteFin=c.hyp, equiteFin=valFin-detteFin, equiteAct=c.base-c.hyp;
  const anneeTerme=(new Date(s.meta.dateAcquisition||'').getFullYear()+horizon)||'—';
  const ltvAct=c.ltv;
  const ltvFin=valFin>0?c.hyp/valFin*100:0;
  const ltvCible=80;                                  // LTV cible pour un réhaussement
  const rehausseFin=Math.max(0, valFin*ltvCible/100 - c.hyp);   // cash dégageable au terme à LTV 80 %
  const vb=valeursBienSorted();
  document.getElementById('scenariosBody').innerHTML=`
    <div class="grid kpis">
      <div class="kpi pos"><div class="kpi-label">Fortune nette projetée</div><div class="kpi-value num">${chf(equiteFin)}</div><div class="kpi-sub">dans ${horizon} ans (${anneeTerme})</div></div>
      <div class="kpi accent"><div class="kpi-label">LTV projetée au terme</div><div class="kpi-value num">${pct(ltvFin)}</div><div class="kpi-sub">aujourd'hui ${pct(ltvAct)}</div></div>
      <div class="kpi"><div class="kpi-label">Réhaussement possible</div><div class="kpi-value num">${chf(rehausseFin)}</div><div class="kpi-sub">cash dégageable à LTV ${ltvCible} %</div></div>
      <div class="kpi ink"><div class="kpi-label">Coût mensuel actuel</div><div class="kpi-value num">${chf(c.detentionAn/12)}</div><div class="kpi-sub">intérêts ${pct(c.tauxMoyen,2)}</div></div>
    </div>

    <h3 class="section-title">Fortune nette &amp; équité immobilière</h3>
    <div class="grid cols-2" style="align-items:start">
      <div class="card">
        <div class="card-head"><h3>Projection sur ${horizon} ans</h3><span class="card-note">appréciation ${pct(s.rendementBien,1)} / an</span></div>
        <div class="chart-wrap h-md"><canvas id="chFortuneNette"></canvas></div>
        <div class="legend">
          <span><i style="background:var(--primary)"></i> Valeur du bien (estimée)</span>
          <span><i style="color:var(--muted-2)" class="dash"></i> Dette résiduelle</span>
          <span><i style="background:var(--accent)"></i> Fortune nette (équité)</span>
          <span><i style="color:var(--neg)" class="dash"></i> LTV (axe droit, %)</span>
          <span><i style="background:var(--neg)"></i> Valeur réelle saisie</span>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><h3>Valeur au terme (${anneeTerme})</h3></div>
        <table class="data"><tbody>
          <tr><td>Valeur estimée au terme</td><td class="r num">${chf(valFin)}</td></tr>
          <tr><td>Dette résiduelle</td><td class="r num">${chf(detteFin)}</td></tr>
          <tr class="sub"><td>Fortune nette projetée</td><td class="r num">${chf(equiteFin)}</td></tr>
          <tr><td>LTV au terme</td><td class="r num">${pct(ltvFin)}</td></tr>
          <tr><td>Gain d'équité sur ${horizon} ans</td><td class="r num" style="color:var(--accent)">${chf(equiteFin-equiteAct)}</td></tr>
        </tbody></table>
        <div style="margin-top:14px">${note('Réhaussement de dette', `La valeur monte et la dette reste constante → la <b>LTV baisse de ${pct(ltvAct)} à ${pct(ltvFin)}</b> en ${horizon} ans. Pour revenir à une LTV de <b>${ltvCible} %</b>, vous pourriez ré-emprunter jusqu'à <b>${chf(rehausseFin)}</b> de cash au terme (survolez le graphique pour la LTV et le réhaussement année par année).`)}</div>
      </div>
    </div>

    <h3 class="section-title">Valeur réelle du bien — réévaluations</h3>
    <div class="grid cols-2" style="align-items:start">
      <div class="card">
        <div class="card-head"><h3>Saisir une réévaluation</h3><span class="card-note">estimation / expertise</span></div>
        <div class="fields-grid">
          <div class="field"><label>Date</label><input type="date" id="vbDate" value="${todayISO()}" /></div>
          <div class="field"><label>Valeur estimée CHF</label><input type="number" id="vbVal" placeholder="ex. 1180000" min="0" step="1000" /></div>
        </div>
        <button class="btn btn-primary" onclick="addValeurBien()">${icon('plus')} Ajouter</button>
        <div style="margin-top:14px">${note('Pourquoi', `Chaque réévaluation apparaît sur le graphique (point) et met à jour la <b>LTV réelle</b>. Utile pour décider d'un réhaussement de dette quand la valeur a réellement monté.`)}</div>
      </div>
      <div class="card">
        <div class="card-head"><h3>Historique des valeurs</h3><span class="card-note">${vb.length} saisie(s)</span></div>
        ${vb.length?`<div class="table-scroll" style="max-height:280px;overflow:auto"><table class="data">
          <thead><tr><th>Date</th><th class="r">Valeur</th><th class="r">LTV réelle</th><th></th></tr></thead>
          <tbody>${[...vb].sort((a,b)=>b.date.localeCompare(a.date)).map(r=>`<tr><td class="num">${fmtDate(r.date)}</td><td class="r num">${chf(r.valeur,true)}</td><td class="r num">${num(r.valeur)>0?pct(c.hyp/num(r.valeur)*100):'—'}</td><td class="r"><button class="btn btn-danger btn-sm btn-icon" onclick="delValeurBien('${esc(r.id)}')" title="Supprimer">${icon('x',15)}</button></td></tr>`).join('')}</tbody>
        </table></div>`:'<div class="empty">Aucune réévaluation saisie. La projection part du prix à l\'acte.</div>'}
      </div>
    </div>

    <h3 class="section-title">Stress-test de taux — renouvellement à l'échéance</h3>
    <div class="grid cols-2" style="align-items:start">
      <div class="card">
        <div class="card-head"><h3>Si votre taux passe à…</h3><span class="card-note">à l'échéance 2031</span></div>
        <div class="slider-row mb12">
          <label>Taux hypothétique au renouvellement</label>
          <input type="range" min="0.5" max="6" step="0.1" value="${s.tauxRenovRisk}" oninput="onTauxRenov(this.value)" />
          <span class="slider-val" id="renovVal">${pct(s.tauxRenovRisk,1)}</span>
        </div>
        ${(()=>{
          const tauxRisk=num(s.tauxRenovRisk)/100;
          const interetsRisk=c.hyp*tauxRisk;
          const delta=interetsRisk-c.interetsAnnuels;
          const detentionRisk=interetsRisk+c.amort+c.chargesPPE+c.fondsReno;
          return `<table class="data"><tbody>
            <tr><td>Intérêts annuels actuels (${pct(c.tauxMoyen,2)})</td><td class="r num">${chf(c.interetsAnnuels)}</td></tr>
            <tr><td>Intérêts annuels projetés (${pct(s.tauxRenovRisk,1)})</td><td class="r num">${chf(interetsRisk)}</td></tr>
            <tr><td>Delta annuel</td><td class="r num" style="color:${delta>0?'var(--neg)':'var(--accent)'}">${delta>=0?'+':''}${chf(delta)}</td></tr>
            <tr><td>Delta mensuel</td><td class="r num" style="color:${delta>0?'var(--neg)':'var(--accent)'}">${delta>=0?'+':''}${chf(delta/12)}</td></tr>
            <tr class="sub"><td>Coût de détention mensuel projeté</td><td class="r num">${chf(detentionRisk/12)}</td></tr>
          </tbody></table>`;
        })()}
      </div>
      <div class="card">
        <div class="card-head"><h3>Tableau de scénarios</h3></div>
        <div class="table-scroll"><table class="data">
          <thead><tr><th>Scénario</th><th class="r">Taux</th><th class="r">Intérêts/an</th><th class="r">Mensuel total</th><th class="r">Delta/mois</th></tr></thead>
          <tbody>
            ${[['Optimiste','0.5%',0.005],['Historique bas','1.0%',0.01],['Taux actuel',pct(c.tauxMoyen,2),c.tauxMoyen/100],['Neutre','2.5%',0.025],['Prudent','3.5%',0.035],['Pessimiste','5.0%',0.05]].map(([label,tauxStr,tx])=>{
              const inter=c.hyp*tx, det=(inter+c.amort+c.chargesPPE+c.fondsReno)/12, dlt=(inter-c.interetsAnnuels)/12;
              const isCurrent=Math.abs(tx-c.tauxMoyen/100)<0.0001;
              return `<tr${isCurrent?' style="font-weight:700"':''}><td>${label}</td><td class="r">${tauxStr}</td><td class="r num">${chf(inter)}</td><td class="r num">${chf(det)}</td><td class="r num" style="color:${dlt>0?'var(--neg)':'var(--accent)'}">${dlt>=0?'+':''}${chf(dlt)}</td></tr>`;
            }).join('')}
          </tbody>
        </table></div>
      </div>
    </div>`;
  buildFortuneNetteChart(c);
}

/* --- Valeur réelle du bien (réévaluations, stockées dans la config) --- */
function addValeurBien(){
  const date=document.getElementById('vbDate').value||todayISO();
  const valeur=num(document.getElementById('vbVal').value);
  if(valeur<=0){ toast('Saisissez une valeur positive.'); return; }
  state.valeursBien=Array.isArray(state.valeursBien)?state.valeursBien:[];
  state.valeursBien.push({id:uid(), date, valeur});
  save(); renderScenarios(); renderRecap(); toast('Réévaluation ajoutée.');
}
function delValeurBien(id){
  const snap=(state.valeursBien||[]).find(v=>v.id===id);
  state.valeursBien=(state.valeursBien||[]).filter(v=>v.id!==id);
  save(); renderScenarios(); renderRecap();
  toast('Réévaluation supprimée.', snap?()=>{ state.valeursBien.push(snap); save(); renderScenarios(); renderRecap(); }:null);
}

async function addHistorique(){
  const date=document.getElementById('hDate').value||todayISO();
  const contratId=document.getElementById('hContrat').value;
  const valeur=num(document.getElementById('hValeur').value);
  if(!contratId){ toast('Sélectionnez un contrat.'); return; }
  if(valeur<=0){ toast('Saisissez une valeur positive.'); return; }
  const entry={id:uid(), date, contratId, valeur};
  if(MODE==='server'){ setSync('saving'); try{ await api('/historique',{method:'POST', body:JSON.stringify(entry)}); setSync('ok'); }catch(e){ setSync('error'); toast('Échec de l\'enregistrement serveur.'); return; } }
  state.historique.push(entry);
  if(MODE!=='server') save();
  renderProjections(); toast('Valeur ajoutée à l\'historique.');
}
async function delHistorique(id){
  const snap=state.historique.find(h=>h.id===id);
  if(MODE==='server'){ setSync('saving'); try{ await api('/historique/'+id,{method:'DELETE'}); setSync('ok'); }catch(e){ setSync('error'); toast('Échec de la suppression serveur.'); return; } }
  state.historique=state.historique.filter(h=>h.id!==id);
  if(MODE!=='server') save();
  renderProjections();
  toast('Saisie supprimée.', snap ? async ()=>{
    if(MODE==='server'){ setSync('saving'); try{ await api('/historique',{method:'POST',body:JSON.stringify(snap)}); setSync('ok'); }catch(e){ setSync('error'); toast('Échec de la restauration.'); return; } }
    state.historique.push(snap);
    if(MODE!=='server') save();
    renderProjections(); toast('Saisie restaurée.');
  } : null);
}

function buildProjChart(){

  const ser=projectionSeries({c, versement3aTotal:c.versement3aTotal}, s.rendement);
  const baseYear=new Date(s.meta.dateAcquisition).getFullYear()||2026;

function buildFortuneNetteChart(c){
  destroyChart('fortuneNette');
  const s=state, horizon=num(s.fin.dureeAmort), rb=num(s.rendementBien)/100;
  const baseYear=new Date(s.meta.dateAcquisition).getFullYear()||2026;
  const ltvCible=80;
  const labels=[], valeurs=[], dettes=[], equites=[], ltvs=[];
  for(let y=0;y<=horizon;y++){
    labels.push(baseYear+y);
    const v=c.base*Math.pow(1+rb,y);   // valeur projetée sur la base bancaire (LTV cohérente à 80 %)
    const d=c.hyp; // indirect : dette constante
    valeurs.push(v); dettes.push(d); equites.push(v-d); ltvs.push(v>0?d/v*100:0);
  }
  // Points de valeur réelle saisis (réévaluations)
  const reals=valeursBienSorted().map(r=>({x:baseYear+yearsBetween(s.meta.dateAcquisition,r.date), y:num(r.valeur)}));
  charts.fortuneNette=new Chart(document.getElementById('chFortuneNette'),{type:'line',
    data:{labels, datasets:[
      {label:'Valeur du bien',data:valeurs,borderColor:COL.ink,backgroundColor:'rgba(29,32,38,.06)',borderWidth:2.5,pointRadius:0,tension:.2,fill:true,yAxisID:'y'},
      {label:'Dette résiduelle',data:dettes,borderColor:COL.n40,borderDash:[6,5],borderWidth:2,pointRadius:0,fill:false,yAxisID:'y'},
      {label:'Fortune nette',data:equites,borderColor:COL.coral,backgroundColor:'rgba(237,88,71,.10)',borderWidth:2.5,pointRadius:0,tension:.2,fill:true,yAxisID:'y'},
      {label:'LTV',data:ltvs,borderColor:COL.coralDeep,borderWidth:2,borderDash:[2,3],pointRadius:0,pointHoverRadius:4,tension:.2,fill:false,yAxisID:'y1'},
      {label:'Valeur réelle',data:reals,borderColor:COL.coralDeep,backgroundColor:COL.coralDeep,borderWidth:2,pointRadius:5,pointHoverRadius:7,pointBorderColor:'#fff',pointBorderWidth:1.5,showLine:true,tension:.1,parsing:false,yAxisID:'y'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{callbacks:{
        label:ctx=>ctx.dataset.label==='LTV'?` LTV : ${ctx.parsed.y.toFixed(1).replace('.',',')} %`:` ${ctx.dataset.label} : ${chf(ctx.parsed.y)}`,
        afterBody:items=>{ const it=items.find(i=>i.dataset.label==='Valeur du bien'); if(!it) return ''; const v=valeurs[it.dataIndex]; const reh=Math.max(0, v*ltvCible/100 - c.hyp); return reh>0?`Réhaussement à ${ltvCible} % : ${chf(reh)}`:'Réhaussement : —'; }
      }}},
      scales:{
        x:{type:'linear',min:baseYear,max:baseYear+horizon,border:{display:false},grid:{color:GRID},ticks:{stepSize:1,callback:v=>v}},
        y:{border:{display:false},grid:{color:GRID},ticks:{callback:v=>fmtNum.format(v)},beginAtZero:true},
        y1:{position:'right',border:{display:false},grid:{drawOnChartArea:false},min:0,suggestedMax:90,ticks:{callback:v=>v+' %'}}
      }}});
}

function fieldNum(path,label,opts={}){
  const v=getPath(path);
  return `<div class="field"><label>${label}${opts.badge?badge():''}</label><input type="number" step="${esc(opts.step||'1')}" value="${v===null||v===undefined?'':v}" placeholder="${esc(opts.ph||'')}" oninput="setPath('${path}', this.value===''?null:parseFloat(this.value)); recalcLight()" />${opts.hint?`<span class="hint">${esc(opts.hint)}</span>`:''}</div>`;
}
function fieldText(path,label,opts={}){
  const v=getPath(path)??'';
  return `<div class="field"><label>${esc(label)}</label><input type="${esc(opts.type||'text')}" value="${esc(v)}" oninput="setPath('${path}', this.value); recalcLight()" />${opts.hint?`<span class="hint">${esc(opts.hint)}</span>`:''}</div>`;
}
function getPath(p){ return p.split('.').reduce((o,k)=>o&&o[k],state); }
function setPath(p,val){ const ks=p.split('.'); let o=state; for(let i=0;i<ks.length-1;i++) o=o[ks[i]]; o[ks[ks.length-1]]=val; save(); }
function recalcLight(){

async function resetAll(){
  if(!confirm('Réinitialiser toutes les valeurs par défaut ? L\'historique 3a et toutes vos saisies seront effacés.')) return;
  if(MODE==='server'){ setSync('saving'); try{ for(const h of [...state.historique]) await api('/historique/'+h.id,{method:'DELETE'}); state=defaultData(); await api('/config',{method:'PUT', body:JSON.stringify(configPayload())}); setSync('ok'); }catch(e){ setSync('error'); toast('Échec de la réinitialisation serveur.'); return; } }
  else { state=defaultData(); save(); }
  renderAll(); switchTab('recap'); toast('Données réinitialisées.');
}

  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(hi), 'Historique 3a');
  XLSX.writeFile(wb, `dashboard-immo-${todayISO()}.xlsx`);
  toast('Classeur Excel généré (5 feuilles).');
}

/* ====================== EXPORT / IMPORT JSON ====================== */
function exportJSON(){
  const payload=JSON.stringify({...state, _exportDate:todayISO()}, null, 2);
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(payload);
  a.download=`patrimoine-${todayISO()}.json`;
  a.click();
  toast('Données exportées en JSON.');
}
function importJSON(){
  const input=document.createElement('input'); input.type='file'; input.accept='.json,application/json';
  input.onchange=async e=>{
    const file=e.target.files[0]; if(!file) return;
    try{
      const text=await file.text();
      const parsed=JSON.parse(text);
      delete parsed._exportDate; delete parsed._auth; delete parsed._user;
      if(!confirm('Remplacer toutes vos données par celles du fichier importé ?')) return;
      if(MODE==='server'){
        // Supprimer l'historique existant
        setSync('saving');
        for(const h of [...state.historique]){ try{ await api('/historique/'+h.id,{method:'DELETE'}); }catch(e){} }
        // Réimporter l'historique du fichier
        const newHist=Array.isArray(parsed.historique)?parsed.historique:[];
        for(const h of newHist){ try{ await api('/historique',{method:'POST',body:JSON.stringify(h)}); }catch(e){} }
        const body={...parsed}; delete body.historique;
        await api('/config',{method:'PUT',body:JSON.stringify(body)});
        setSync('ok');
      }
      state=deepMerge(defaultData(), parsed);
      if(MODE!=='server') save();
      renderAll(); switchTab('recap'); toast('Import réussi.');
    }catch(err){ toast('Erreur lors de l\'import : fichier invalide.'); }
  };
  input.click();
}

/* Avertissement si une sauvegarde est en cours lors de la fermeture */
window.addEventListener('beforeunload', e=>{
  const p=document.getElementById('syncPill');
  if(p && p.textContent.includes('Enregistrement')){ e.preventDefault(); }
});

/* ====================== INIT ====================== */
boot();
